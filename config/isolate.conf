box_root = /var/lib/isolate
lock_root = /run/isolate/locks

cg_root = auto:/run/isolate/cgroup

first_uid = 60000
first_gid = 60000
num_boxes = 1000

# Core System
dir0 = /lib:ro
dir1 = /lib64:ro
dir2 = /usr/lib:ro
dir3 = /etc/ld.so.cache:ro

# Binaries
dir4 = /usr/bin:ro
dir5 = /bin:ro
dir6 = /sbin:ro

# Java Fix need the entire JVM directory and all of /etc
dir7 = /usr/lib/jvm:ro
dir8 = /etc:ro

# Requirements for Python/Node/Java
dir9 = /usr/share:ro

# Essential Devices
dir11 = /dev/urandom:rw
dir12 = /dev/null:rw
dir13 = /dev/zero:rw